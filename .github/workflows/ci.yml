name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # One Windows lane (the maintainer develops on Windows; Source and
          # LocalBlobStore do path work). Keep it small: 3.12 only.
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check rag_blocks tests
      - name: Type-check (mypy)
        run: mypy rag_blocks
      - name: Test with coverage
        run: pytest --cov=rag_blocks --cov-report=term-missing --cov-fail-under=80
