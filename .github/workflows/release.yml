name: Release

# Publishes to PyPI when a push to main carries a version (pyproject.toml)
# that is not yet on PyPI. The version bump IS the release button:
#   1. bump [project].version + move CHANGELOG [Unreleased] into the entry
#   2. merge to main
#   3. this workflow: gate -> test -> build -> publish (OIDC) -> tag + GH Release
#
# Auth is PyPI Trusted Publishing — NO token lives in this repo. The
# publisher is registered on PyPI as (owner, repo, release.yml, env "pypi").

on:
  push:
    branches: [main]

# Never run two releases at once; never cancel one mid-publish.
concurrency:
  group: pypi-release
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Publish only if this version is not already on PyPI
        id: decide
        run: |
          LOCAL=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PUBLISHED=$(curl -sf https://pypi.org/pypi/rag-blocks/json \
            | python -c "import json,sys; print('\n'.join(json.load(sys.stdin)['releases']))" \
            || true)  # 404 = project not on PyPI yet = publish
          if echo "$PUBLISHED" | grep -qx "$LOCAL"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$LOCAL already on PyPI — nothing to release."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$LOCAL is new — releasing."
          fi
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"

  test:
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"   # oldest supported: catches >=3.11-isms
      - name: Lint, type-check, hermetic tests
        run: |
          python -m pip install -e ".[dev]"
          ruff check .
          mypy rag_blocks
          pytest

  build:
    needs: [gate, test]
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: studio/app/package-lock.json
      # Build the optional Studio app and stage it where hatch's `artifacts`
      # rule (rag_blocks/studio/_dist/**) picks it up, so the wheel ships a
      # ready-to-run `rag-blocks studio`. tsc + vitest run here too: a broken
      # Studio blocks the release. Node is a build-time-only dependency.
      - name: Build Studio (frontend)
        working-directory: studio/app
        run: |
          npm ci
          npm run test
          npm run build
      - name: Bundle Studio into the package
        run: |
          rm -rf rag_blocks/studio/_dist
          cp -r studio/app/dist rag_blocks/studio/_dist
          test -f rag_blocks/studio/_dist/index.html
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: "Sanity: the wheel bundled the Studio build"
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          assert any(n.startswith("rag_blocks/studio/_dist/") for n in names), \
              "wheel is missing the bundled Studio build"
          print("OK: Studio bundled in", whl)
          PY
      - name: Check metadata
        run: python -m twine check --strict dist/*
      - name: "Sanity: built version matches the gate"
        run: |
          ls dist/ | grep -F "${{ needs.gate.outputs.version }}"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: [gate, build]
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # mint the OIDC token for Trusted Publishing
    steps:
      # Deliberately NO checkout: this job never runs project code.
      # It downloads the already-built, already-checked artifact and ships it.
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  tag:
    needs: [gate, publish]
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the tag + GitHub Release
    steps:
      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.gate.outputs.version }}
        run: |
          gh release create "v$V" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v$V" \
            --generate-notes
